name: GitHub Issue to Support

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  create-ticket:
    runs-on: ubuntu-latest

    steps:
      - name: Create Support ticket
        env:
          FRESHDESK_DOMAIN: ${{ secrets.FRESHDESK_DOMAIN }}
          FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_REQUESTER_EMAIL: ${{ secrets.FRESHDESK_REQUESTER_EMAIL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          issue_body = os.environ.get("ISSUE_BODY") or ""
          default_email = os.environ["FRESHDESK_REQUESTER_EMAIL"]

          # First email found in the issue body wins; otherwise use the default
          match = re.search(r'([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})', issue_body)
          requester_email = match.group(1) if match else default_email

          payload = {
              "email": requester_email,
              "subject": f"[GitHub][{os.environ['REPOSITORY']}] {os.environ['ISSUE_TITLE']} (#{os.environ['ISSUE_NUMBER']})",
              "description": (
                  f"Repository: {os.environ['REPOSITORY']}<br>"
                  f"Issue: <a href='{os.environ['ISSUE_URL']}'>#{os.environ['ISSUE_NUMBER']}</a><br>"
                  f"Opened by: {os.environ['ISSUE_USER']}<br><br>"
                  f"{issue_body}"
              ),
              "status": 2,
              "priority": 1
          }

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)

          result = subprocess.run(
              [
                  "curl",
                  "--fail",
                  "--silent",
                  "--show-error",
                  "-u", f"{os.environ['FRESHDESK_API_KEY']}:X",
                  "-H", "Content-Type: application/json",
                  "-X", "POST",
                  f"https://{os.environ['FRESHDESK_DOMAIN']}/api/v2/tickets",
                  "-o", "response.json",
                  "--data-binary", "@payload.json",
              ],
              check=False,
          )

          if result.returncode != 0:
              if os.path.exists("response.json"):
                  with open("response.json", "r", encoding="utf-8", errors="ignore") as f:
                      print(f.read())
              sys.exit(result.returncode)
          PY

      - name: Comment Support ticket ID back to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = JSON.parse(fs.readFileSync('response.json', 'utf8'));

            const ticketId = response.id;
            const ticketUrl = response.url;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Support ticket created: #${ticketId}${ticketUrl ? `\n${ticketUrl}` : ''}`
            });